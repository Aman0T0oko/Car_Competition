<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>浙江杭州公交车行驶路径图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    html, body, #map { height: 100%; margin: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .panel {
      position: absolute;
      right: 12px;
      bottom: 24px;
      z-index: 900;
      width: min(390px, calc(100vw - 24px));
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #d9dee7;
      border-radius: 8px;
      box-shadow: 0 12px 34px rgba(31, 41, 55, 0.18);
      color: #152033;
    }
    .route-panel {
      position: absolute;
      top: 84px;
      left: 12px;
      z-index: 1000;
      width: 230px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #d9dee7;
      border-radius: 8px;
      box-shadow: 0 12px 34px rgba(31, 41, 55, 0.18);
      color: #152033;
    }
    .panel header, .route-panel header {
      padding: 12px 14px 8px;
      border-bottom: 1px solid #e5e9f0;
      font-weight: 700;
      font-size: 15px;
    }
    .route-list {
      padding: 10px 12px 12px;
      display: grid;
      gap: 8px;
      font-size: 13px;
    }
    .date-filter {
      padding: 10px 12px 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 12px;
    }
    .date-filter label {
      display: grid;
      gap: 4px;
      min-width: 0;
    }
    .date-filter select {
      width: 100%;
      border: 1px solid #cfd6e3;
      border-radius: 6px;
      padding: 5px 6px;
      background: white;
      color: #152033;
      font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .route-toggle {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 8px;
      align-items: center;
      cursor: pointer;
      min-height: 24px;
    }
    .route-toggle input {
      width: 16px;
      height: 16px;
      margin: 0;
    }
    .route-toggle span {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px 14px;
      font-size: 12px;
    }
    .stat {
      border: 1px solid #e0e5ed;
      border-radius: 6px;
      padding: 8px;
      background: #fbfcfe;
    }
    .stat strong { display: block; font-size: 17px; margin-bottom: 2px; }
    .legend {
      padding: 0 14px 12px;
      font-size: 12px;
      line-height: 1.85;
    }
    .match-list {
      margin-top: 6px;
      display: grid;
      gap: 3px;
      line-height: 1.45;
    }
    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: -1px;
    }
    .route-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 2px 6px 2px 0;
      white-space: nowrap;
    }
    .line {
      width: 22px;
      height: 4px;
      border-radius: 3px;
      display: inline-block;
    }
    .leaflet-popup-content { font-size: 13px; line-height: 1.5; }
    .leaflet-control-layers {
      border: 1px solid #d9dee7 !important;
      border-radius: 8px !important;
      box-shadow: 0 8px 24px rgba(31, 41, 55, 0.12) !important;
    }
    .ui-toggle {
      position: absolute;
      left: 12px;
      bottom: 24px;
      z-index: 1100;
      min-width: 76px;
      min-height: 34px;
      border: 1px solid #cfd6e3;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 8px 22px rgba(31, 41, 55, 0.16);
      color: #152033;
      cursor: pointer;
      font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .ui-toggle:hover {
      background: #f8fafc;
    }
    body.ui-hidden .route-panel,
    body.ui-hidden .panel {
      display: none;
    }
    @media (max-width: 680px) {
      .route-panel {
        top: 82px;
        left: 10px;
        width: min(230px, calc(100vw - 20px));
      }
      .panel {
        left: 10px;
        right: 10px;
        bottom: 62px;
        width: auto;
        max-height: 34vh;
        overflow: auto;
      }
      .ui-toggle {
        left: 10px;
        bottom: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <button class="ui-toggle" id="uiToggle" type="button" aria-pressed="false">隐藏 UI</button>
  <aside class="route-panel">
    <header>CSV 轨迹</header>
    <div class="date-filter" id="dateControls"></div>
    <div class="route-list" id="routeControls"></div>
  </aside>
  <aside class="panel">
    <header>浙江杭州公交车行驶路径图</header>
    <div class="stats" id="stats"></div>
    <div class="legend" id="legend"></div>
  </aside>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const colors = ["#2563eb", "#16a34a", "#dc2626", "#7c3aed", "#ea580c"];
    const map = L.map("map", { preferCanvas: true });
    const base = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const routeLayers = L.layerGroup().addTo(map);
    const startEndLayers = L.layerGroup().addTo(map);
    const chargingLayer = L.layerGroup().addTo(map);
    const stationLayer = L.layerGroup().addTo(map);
    const signalLayer = L.layerGroup().addTo(map);
    const routeEndpointLayers = new Map();
    const linkedMarkerRecords = [];
    let activeFiles = new Set();
    let activeStartDate = "";
    let activeEndDate = "";
    const overlays = {
      "道路化行驶路径": routeLayers,
      "起点 / 终点": startEndLayers,
      "充电位置": chargingLayer,
      "公交站点": stationLayer,
      "红绿灯": signalLayer
    };
    L.control.layers({"OpenStreetMap": base}, overlays, { collapsed: false }).addTo(map);

    function circle(lat, lon, color, radius, label, fill = color) {
      return L.circleMarker([lat, lon], {
        radius,
        color,
        weight: 2,
        fillColor: fill,
        fillOpacity: 0.88
      }).bindPopup(label);
    }

    const CanvasRouteLayer = L.Layer.extend({
      initialize(segments, routes) {
        this.segments = segments.map(segment => ({
          ...segment,
          projected: [],
          bounds: null
        }));
        this.routeColor = new Map(routes.map((route, index) => [route.file, colors[index % colors.length]]));
        this.visibleFiles = new Set(routes.map(route => route.file));
        this.startDate = "";
        this.endDate = "";
      },
      setVisible(file, visible) {
        if (visible) this.visibleFiles.add(file);
        else this.visibleFiles.delete(file);
        if (this.map) this.reset();
      },
      setDateRange(startDate, endDate) {
        this.startDate = startDate || "";
        this.endDate = endDate || "";
        if (this.map) this.reset();
      },
      onAdd(mapInstance) {
        this.map = mapInstance;
        this.canvas = L.DomUtil.create("canvas", "leaflet-zoom-animated");
        this.ctx = this.canvas.getContext("2d");
        mapInstance.getPanes().overlayPane.appendChild(this.canvas);
        mapInstance.on("move zoom resize zoomend", this.reset, this);
        mapInstance.on("click", this.handleClick, this);
        this.reset();
      },
      onRemove(mapInstance) {
        mapInstance.off("move zoom resize zoomend", this.reset, this);
        mapInstance.off("click", this.handleClick, this);
        this.canvas.remove();
      },
      segmentActiveFiles(segment) {
        return (segment.files || []).filter(file =>
          this.visibleFiles.has(file) && datesInRange((segment.dates_by_file || {})[file] || [], this.startDate, this.endDate)
        );
      },
      reset() {
        const size = this.map.getSize();
        const topLeft = this.map.containerPointToLayerPoint([0, 0]);
        L.DomUtil.setPosition(this.canvas, topLeft);
        const scale = window.devicePixelRatio || 1;
        this.canvas.width = size.x * scale;
        this.canvas.height = size.y * scale;
        this.canvas.style.width = `${size.x}px`;
        this.canvas.style.height = `${size.y}px`;
        const ctx = this.ctx;
        ctx.setTransform(scale, 0, 0, scale, 0, 0);
        ctx.clearRect(0, 0, size.x, size.y);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        const drawSegment = (segment, strokeStyle, lineWidth, alpha, offset = 0) => {
          const pts = segment.path.map(([lat, lon]) => this.map.latLngToContainerPoint([lat, lon]));
          segment.projected = pts;
          if (pts.length < 2) return;
          const first = pts[0];
          const last = pts[pts.length - 1];
          const dx = last.x - first.x;
          const dy = last.y - first.y;
          const len = Math.hypot(dx, dy) || 1;
          const ox = -dy / len * offset;
          const oy = dx / len * offset;
          ctx.beginPath();
          ctx.strokeStyle = strokeStyle;
          ctx.lineWidth = lineWidth;
          ctx.globalAlpha = alpha;
          pts.forEach((pt, index) => index === 0 ? ctx.moveTo(pt.x + ox, pt.y + oy) : ctx.lineTo(pt.x + ox, pt.y + oy));
          ctx.stroke();
        };

        const activeSegments = this.segments
          .map(segment => [segment, this.segmentActiveFiles(segment)])
          .filter(([, files]) => files.length);
        for (const [segment, files] of activeSegments) {
          files.forEach((file, index) => {
            const offset = (index - (files.length - 1) / 2) * 5;
            drawSegment(segment, "rgba(255, 255, 255, 0.95)", segment.source === "osrm" ? 7.8 : 5.8, 0.82, offset);
          });
        }
        for (const [segment, files] of activeSegments) {
          files.forEach((file, index) => {
            const offset = (index - (files.length - 1) / 2) * 5;
            const color = this.routeColor.get(file) || "#2563eb";
            const width = segment.source === "osrm" ? 4.6 : 3.2;
            drawSegment(segment, color, width, segment.source === "osrm" ? 0.96 : 0.86, offset);
          });
        }
        ctx.globalAlpha = 1;
      },
      handleClick(event) {
        const click = this.map.latLngToContainerPoint(event.latlng);
        let best = null;
        for (const segment of this.segments) {
          const files = this.segmentActiveFiles(segment);
          if (!files.length || !segment.projected || segment.projected.length < 2) continue;
          for (let i = 0; i < segment.projected.length - 1; i++) {
            const dist = pointLineDistance(click, segment.projected[i], segment.projected[i + 1]);
            if (dist <= 8 && (!best || dist < best.dist)) best = { segment, files, dist };
          }
        }
        if (!best) return;
        const segment = best.segment;
        const counts = Object.entries(segment.match_counts_by_file || {})
          .filter(([file]) => best.files.includes(file))
          .map(([file, count]) => {
            const dateCount = datesForFileInRange(segment.dates_by_file, file).length;
            const flags = [
              (segment.graph_connect_files || []).includes(file) ? "可信路网连接" : "",
              (segment.continuity_fill_files || []).includes(file) ? "同路补齐" : ""
            ].filter(Boolean).join("，");
            return `<code>${escapeHtml(file)}</code>：${Number(count || 0).toLocaleString()} 条，${dateCount} 天${flags ? `，${flags}` : ""}`;
          })
          .join("<br>");
        L.popup()
          .setLatLng(event.latlng)
          .setContent(`<strong>道路化轨迹</strong><br>道路名：${escapeHtml(segment.name || "未命名道路")}<br>道路等级：${escapeHtml(segment.highway || "未知")}<br>来源：${segment.source === "osrm" ? "OSRM 精修" : "本地 OSM 精确匹配"}${(segment.graph_connect_files || []).some(file => best.files.includes(file)) ? "，路网连接" : ""}${(segment.continuity_fill_files || []).some(file => best.files.includes(file)) ? "，同路段补齐" : ""}<br>关联 CSV：${formatFiles(best.files)}<br>匹配记录：<br>${counts || "连接补齐路段"}`)
          .openOn(this.map);
      }
    });

    function pointLineDistance(p, a, b) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      if (dx === 0 && dy === 0) return Math.hypot(p.x - a.x, p.y - a.y);
      const t = Math.max(0, Math.min(1, ((p.x - a.x) * dx + (p.y - a.y) * dy) / (dx * dx + dy * dy)));
      const cx = a.x + t * dx;
      const cy = a.y + t * dy;
      return Math.hypot(p.x - cx, p.y - cy);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[ch]));
    }

    function formatDuration(seconds) {
      const total = Number(seconds || 0);
      const minutes = Math.floor(total / 60);
      const rest = total % 60;
      return minutes > 0 ? `${minutes}分${rest}秒` : `${rest}秒`;
    }

    function formatPercent(value) {
      return `${(Number(value || 0) * 100).toFixed(1)}%`;
    }

    function formatFiles(files) {
      return (files || []).map(file => `<code>${escapeHtml(file)}</code>`).join("、") || "无";
    }

    function dateInRange(date, startDate = activeStartDate, endDate = activeEndDate) {
      if (!date) return !startDate && !endDate;
      if (startDate && date < startDate) return false;
      if (endDate && date > endDate) return false;
      return true;
    }

    function datesInRange(dates, startDate = activeStartDate, endDate = activeEndDate) {
      if (!startDate && !endDate) return true;
      return (dates || []).some(date => dateInRange(date, startDate, endDate));
    }

    function datesByFileInRange(datesByFile, files) {
      if (!activeStartDate && !activeEndDate) return true;
      return (files || []).some(file => datesInRange((datesByFile || {})[file] || []));
    }

    function datesForFileInRange(datesByFile, file, startDate = activeStartDate, endDate = activeEndDate) {
      return ((datesByFile || {})[file] || []).filter(date => dateInRange(date, startDate, endDate));
    }

    function aggregateDateStats(route, startDate = activeStartDate, endDate = activeEndDate) {
      const byDate = route.road_match.by_date || {};
      const total = {
        total_points: 0,
        matched_points: 0,
        low_confidence_segments: 0,
        temporal_removed_segments: 0,
        continuity_fill_segments: 0,
        graph_connect_segments: 0,
        graph_connect_attempts: 0,
        graph_connect_failed: 0,
        graph_connect_skipped_far: 0,
        graph_connect_skipped_untrusted: 0
      };
      Object.entries(byDate).forEach(([date, stats]) => {
        if (!dateInRange(date, startDate, endDate)) return;
        Object.keys(total).forEach(key => {
          total[key] += Number(stats[key] || 0);
        });
      });
      total.match_rate = total.total_points ? total.matched_points / total.total_points : 0;
      return total;
    }

    function hasActiveFile(files) {
      return (files || []).some(file => activeFiles.has(file));
    }

    function markerShouldShow(record) {
      return hasActiveFile(record.files) && datesByFileInRange(record.datesByFile, record.files);
    }

    function addLinkedMarker(group, marker, files, datesByFile = null) {
      const record = { group, marker, files: files || [], datesByFile: datesByFile || {} };
      linkedMarkerRecords.push(record);
      if (markerShouldShow(record)) marker.addTo(group);
    }

    function refreshLinkedMarkers() {
      linkedMarkerRecords.forEach(record => {
        const shouldShow = markerShouldShow(record);
        const isShown = record.group.hasLayer(record.marker);
        if (shouldShow && !isShown) record.marker.addTo(record.group);
        if (!shouldShow && isShown) record.group.removeLayer(record.marker);
      });
    }

    function setupUiToggle() {
      const button = document.getElementById("uiToggle");
      button.addEventListener("click", () => {
        const hidden = document.body.classList.toggle("ui-hidden");
        button.textContent = hidden ? "显示 UI" : "隐藏 UI";
        button.setAttribute("aria-pressed", String(hidden));
      });
    }

    function buildRouteControls(routes, canvasRoutes, renderStats) {
      const container = document.getElementById("routeControls");
      container.innerHTML = routes.map((route, index) => `
        <label class="route-toggle">
          <input type="checkbox" data-file="${escapeHtml(route.file)}" checked>
          <span><span class="line" style="background:${colors[index % colors.length]}"></span>${escapeHtml(route.file)} · ${formatPercent(route.road_match.match_rate)}</span>
        </label>
      `).join("");
      container.querySelectorAll("input[type='checkbox']").forEach(input => {
        input.addEventListener("change", event => {
          const file = event.target.dataset.file;
          const visible = event.target.checked;
          canvasRoutes.setVisible(file, visible);
          if (visible) activeFiles.add(file);
          else activeFiles.delete(file);
          const endpointLayer = routeEndpointLayers.get(file);
          if (endpointLayer) {
            if (visible) endpointLayer.addTo(startEndLayers);
            else startEndLayers.removeLayer(endpointLayer);
          }
          refreshLinkedMarkers();
          renderStats();
        });
      });
    }

    function buildDateControls(dates, canvasRoutes, renderStats) {
      const container = document.getElementById("dateControls");
      const options = (dates || []).map(date => `<option value="${escapeHtml(date)}">${escapeHtml(date)}</option>`).join("");
      container.innerHTML = `
        <label>开始
          <select id="startDateSelect">
            <option value="">全部</option>
            ${options}
          </select>
        </label>
        <label>结束
          <select id="endDateSelect">
            <option value="">全部</option>
            ${options}
          </select>
        </label>
      `;
      const startSelect = document.getElementById("startDateSelect");
      const endSelect = document.getElementById("endDateSelect");
      const apply = () => {
        let start = startSelect.value;
        let end = endSelect.value;
        if (start && end && start > end) {
          end = start;
          endSelect.value = end;
        }
        activeStartDate = start;
        activeEndDate = end;
        canvasRoutes.setDateRange(activeStartDate, activeEndDate);
        refreshLinkedMarkers();
        renderStats();
      };
      startSelect.addEventListener("change", apply);
      endSelect.addEventListener("change", apply);
    }

    setupUiToggle();

    fetch("bus_route_map_data.json")
      .then(response => response.json())
      .then(data => {
        const bounds = [];
        activeFiles = new Set(data.routes.map(route => route.file));
        const canvasRoutes = new CanvasRouteLayer(data.road_segments || [], data.routes).addTo(routeLayers);
        const segmentVisible = segment => (segment.files || []).some(file =>
          activeFiles.has(file) && datesInRange((segment.dates_by_file || {})[file] || [])
        );
        const renderStats = () => {
          const visibleSegments = (data.road_segments || []).filter(segmentVisible).length;
          const activeRoutes = data.routes.filter(route => activeFiles.has(route.file));
          const rangeStatsByFile = new Map(activeRoutes.map(route => [route.file, aggregateDateStats(route)]));
          const selectedPoints = Array.from(rangeStatsByFile.values()).reduce((sum, stats) => sum + stats.total_points, 0);
          const selectedMatched = Array.from(rangeStatsByFile.values()).reduce((sum, stats) => sum + stats.matched_points, 0);
          const selectedRate = selectedPoints ? selectedMatched / selectedPoints : 0;
          const lowQuality = activeRoutes.filter(route => {
            const stats = rangeStatsByFile.get(route.file);
            return stats && stats.total_points > 0 && stats.match_rate < 0.9;
          });
          const dateText = activeStartDate || activeEndDate
            ? `${activeStartDate || "最早"} 至 ${activeEndDate || "最晚"}`
            : "全部日期";
          const matchRows = activeRoutes.map(route => {
            const stats = rangeStatsByFile.get(route.file) || aggregateDateStats(route);
            if (!stats.total_points) {
              return `<div><code>${escapeHtml(route.file)}</code> 当前范围无数据；全量匹配 ${formatPercent(route.road_match.match_rate)}</div>`;
            }
            return `<div><code>${escapeHtml(route.file)}</code> 当前范围匹配 ${formatPercent(stats.match_rate)}（${Number(stats.matched_points || 0).toLocaleString()}/${Number(stats.total_points || 0).toLocaleString()} 点），全量 ${formatPercent(route.road_match.match_rate)}；剔除 ${stats.temporal_removed_segments || 0} 段，同路补齐 ${stats.continuity_fill_segments || 0} 段，可信路网连接 ${stats.graph_connect_segments || 0} 段，低置信 ${stats.low_confidence_segments || 0} 段，不可信跳过 ${stats.graph_connect_skipped_untrusted || 0} 次${stats.match_rate < 0.9 ? "，需要人工/API 精修" : ""}</div>`;
          }
          ).join("");
          document.getElementById("stats").innerHTML = `
            <div class="stat"><strong>${activeFiles.size}</strong>CSV 轨迹</div>
            <div class="stat"><strong>${selectedPoints.toLocaleString()}</strong>当前压缩点</div>
            <div class="stat"><strong>${formatPercent(selectedRate)}</strong>当前匹配率</div>
            <div class="stat"><strong>${visibleSegments.toLocaleString()}</strong>道路化片段</div>
            <div class="stat"><strong>${data.osm_counts.confirmed_stop_bus_stop || 0}</strong>正式站 / <strong style="display:inline">${data.osm_counts.traffic_signal}</strong>灯</div>
          `;
          document.getElementById("legend").innerHTML = `
            <div>${data.routes.map((route, index) => `<span class="route-chip"><span class="line" style="background:${colors[index % colors.length]}"></span>${escapeHtml(route.file)}</span>`).join("")}</div>
            <div>日期范围：${escapeHtml(dateText)}</div>
            <div>主轨迹已道路化：按日期/时间清洗孤立错误段，35m 公交道路吸附为主，排除小区/服务/私有道路；只用同日、时间连续、速度和绕行比例可信的 OSM 路网连接补齐缺口。</div>
            <div class="match-list">${matchRows}</div>
            <div><span class="dot" style="background:#0f766e"></span>起点 <span class="dot" style="background:#991b1b;margin-left:12px"></span>终点 <span class="dot" style="background:#f59e0b;margin-left:12px"></span>充电位置</div>
            <div><span class="dot" style="background:#60a5fa"></span>正式站 <span class="dot" style="background:#fde047;margin-left:12px"></span>候选站 <span class="dot" style="background:#dc2626;margin-left:12px"></span>红绿灯</div>
            <div>正式站阈值：同一 CSV 同一 OSM 站点至少 ${data.summary.confirmed_stop_min_events} 次、跨至少 ${data.summary.confirmed_stop_min_days} 天；靠近红绿灯但缺少重复规律的停车只保留为候选。</div>
            <div>CSV 和日期下拉框会联动隐藏/显示对应道路轨迹、充电位置、站点、红绿灯。${lowQuality.length ? " 当前日期范围内有线路低于 90%，建议后续接入高德/百度/Google API 深度精修。" : ""}</div>
          `;
        };
        data.routes.forEach((route, index) => {
          bounds.push([route.start.lat, route.start.lon], [route.end.lat, route.end.lon]);
          const endpointLayer = L.layerGroup();
          circle(route.start.lat, route.start.lon, "#0f766e", 8, `<strong>${escapeHtml(route.file)} 起点</strong><br>${escapeHtml(route.start.time)}<br>SOC：${escapeHtml(route.start.soc)}`).addTo(endpointLayer);
          circle(route.end.lat, route.end.lon, "#991b1b", 8, `<strong>${escapeHtml(route.file)} 终点</strong><br>${escapeHtml(route.end.time)}<br>SOC：${escapeHtml(route.end.soc)}`).addTo(endpointLayer);
          endpointLayer.addTo(startEndLayers);
          routeEndpointLayers.set(route.file, endpointLayer);
        });
        buildRouteControls(data.routes, canvasRoutes, renderStats);
        buildDateControls(data.summary.available_dates || [], canvasRoutes, renderStats);
        if (data.summary.bbox) {
          const [minLon, minLat, maxLon, maxLat] = data.summary.bbox;
          bounds.push([minLat, minLon], [maxLat, maxLon]);
        }

        data.charging_locations.forEach(item => {
          const marker = circle(item.lat, item.lon, "#f59e0b", Math.min(12, 5 + Math.log10(item.count + 1) * 2.8),
            `<strong>充电位置</strong><br>${escapeHtml(item.name)}<br>关联 CSV：${formatFiles(item.files)}<br>记录数：${item.count.toLocaleString()}<br>状态：${escapeHtml(JSON.stringify(item.charge_states))}<br>${escapeHtml(item.first_time)} 至 ${escapeHtml(item.last_time)}`,
            "#fde68a");
          addLinkedMarker(chargingLayer, marker, item.files, item.dates_by_file);
        });

        data.osm_pois.filter(p => p.kind === "bus_stop").forEach(item => {
          const hasConfirmed = item.stop_files && item.stop_files.length;
          const hasCandidate = item.candidate_stop_files && item.candidate_stop_files.length;
          const statsHtml = Object.entries(item.stop_stats || {}).map(([file, stats]) =>
            `<br><code>${escapeHtml(file)}</code>：${stats.status === "confirmed" ? "正式" : "候选"}，停靠 ${stats.events} 次，跨 ${stats.service_days} 天，累计 ${formatDuration(stats.total_dwell_s)}，最长 ${formatDuration(stats.max_dwell_s)}${stats.nearest_traffic_signal_m !== null ? `，近红绿灯 ${stats.nearest_traffic_signal_m}m` : ""}`
          ).join("") || "<br>停靠证据：未达到重复停靠阈值";
          const label = hasConfirmed ? "正式停靠站" : (hasCandidate ? "候选站点" : "沿线站点");
          const marker = circle(item.lat, item.lon, hasConfirmed ? "#1d4ed8" : (hasCandidate ? "#ca8a04" : "#64748b"), hasConfirmed ? 5.8 : (hasCandidate ? 4.8 : 3.4),
            `<strong>${label}</strong><br>${escapeHtml(item.name || "未命名站点")}<br>轨迹关联：${formatFiles(item.files)}<br>正式归属：${formatFiles(item.stop_files)}<br>候选归属：${formatFiles(item.candidate_stop_files)}${statsHtml}`,
            hasConfirmed ? "#60a5fa" : (hasCandidate ? "#fde047" : "#cbd5e1"));
          const stationDatesByFile = Object.fromEntries(Object.entries(item.stop_stats || {}).map(([file, stats]) => [file, stats.dates || []]));
          addLinkedMarker(stationLayer, marker, item.files, stationDatesByFile);
        });
        data.osm_pois.filter(p => p.kind === "traffic_signal").forEach(item => {
          const marker = circle(item.lat, item.lon, "#dc2626", 3.8,
            `<strong>红绿灯</strong><br>${escapeHtml(item.name || "交通信号灯")}<br>关联 CSV：${formatFiles(item.files)}<br>最近道路化轨迹距离：${item.distance_m} m`,
            "#fecaca");
          addLinkedMarker(signalLayer, marker, item.files, item.dates_by_file);
        });

        if (bounds.length) {
          map.fitBounds(bounds, { padding: [28, 28] });
        }

        renderStats();
      })
      .catch(error => {
        console.error(error);
        document.getElementById("stats").innerHTML = `<div class="stat"><strong>错误</strong>数据加载失败</div>`;
      });
  </script>
</body>
</html>
